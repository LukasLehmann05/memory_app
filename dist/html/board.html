<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory-Board</title>
</head>

<body class="body-board">
    <header class="header-board">
        <div class="player-points">
            <div class="player blue">
                <img src="../img/themes/code_vibe/blue_icon.svg" alt="icon blue">
                <p>Blue</p>
                <p>0</p>
            </div>

            <div class="player orange">
                <img src="../img/themes/code_vibe/orange_icon.svg" alt="icon orange">
                <p>Orange</p>
                <p>0</p>
            </div>
        </div>

        <div class="player-section">
            <h1>Current player:</h1>
            <img src="../img/themes/code_vibe/blue_icon.svg" alt="player icon">
        </div>

        <button class="exit-button code-vibe-button">
            <img src="../img/exit_icon.svg" alt="exit icon">
            <p>Exit game</p>
        </button>
    </header>

    <main id="card_container" class="card-container">

    </main>
</body>

<script type="module" src="../src/script/board.ts"></script>

</html>
