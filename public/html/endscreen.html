<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory-App</title>
</head>

<body class="body-endscreen" id="body_endscreen">
    <header class="header-endscreen">
        <h1>Game Over</h1>
        <img src="../img/game_over_green.svg" alt="Game over">
    </header>
    <main class="final-score" id="main_endscreen">
        <p>Final score</p>
        <div class="points-display" id="points_display_section">
            <section class="display-points display-blue">
                <img src="" alt="Blue" id="player_blue">
                <span id="points_blue"></span>
            </section>
            <section class="display-points display-orange">
                <img src="" alt="Orange" id="player_orange">
                <span id="points_orange"></span>
            </section>
        </div>
    </main>

    <div class="slide-out" id="slide_out">
        <p>It's a</p>
        <h2>DRAW</h2>
        <img src="" alt="" id="slideout_img">
        <button>Home</button>
    </div>
</body>

<script type="module" src="../src/script/game_ended.ts"></script>

</html>
