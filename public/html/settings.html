<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="body-settings">
    <article class="settings-content">
        <header>
            <h1>Settings</h1>
        </header>

        <main class="settings-main">
            <div class="settings-selection">
                <section>
                    <div class="settings-subtitle">
                        <img src="../img/palette.svg" alt="pallete">
                        <h2>Game Themes</h2>
                    </div>

                    <div class="all-selectors">
                        <section class="select-option selected">
                            <div class="selector">
                                <div class="active-selected"></div>
                            </div>
                            <p>Code Vibes Theme</p>
                        </section>

                        <section class="select-option">
                            <div class="selector">
                                <div class="active-selected"></div>
                            </div>
                            <p>Gaming Theme</p>
                        </section>

                        <section class="select-option">
                            <div class="selector">
                                <div class="active-selected"></div>
                            </div>
                            <p>DA Project Theme</p>
                        </section>

                        <section class="select-option">
                            <div class="selector">
                                <div class="active-selected"></div>
                            </div>
                            <p>Foods Theme</p>
                        </section>
                    </div>
                </section>

                <section>
                    <div class="settings-subtitle">
                        <img src="../img/chess_pawn.svg" alt="pallete">
                        <h2>Choose Player</h2>
                    </div>

                    <div class="all-selectors">
                        <section class="select-option selected">
                            <div class="selector">
                                <div class="active-selected"></div>
                            </div>
                            <p>Blue</p>
                        </section>

                        <section class="select-option">
                            <div class="selector">
                                <div class="active-selected"></div>
                            </div>
                            <p>Orange</p>
                        </section>
                    </div>
                </section>

                <section>
                    <div class="settings-subtitle">
                        <img src="../img/board.svg" alt="pallete">
                        <h2>Board Size</h2>
                    </div>

                    <div class="all-selectors">
                        <section class="select-option selected">
                            <div class="selector">
                                <div class="active-selected"></div>
                            </div>
                            <p>16 Cards</p>
                        </section>

                        <section class="select-option">
                            <div class="selector">
                                <div class="active-selected"></div>
                            </div>
                            <p>24 Cards</p>
                        </section>

                        <section class="select-option">
                            <div class="selector">
                                <div class="active-selected"></div>
                            </div>
                            <p>36 Cards</p>
                        </section>
                    </div>
                </section>
            </div>
        </main>
    </article>
</body>

<script type="module" src="../src/main.ts"></script>

</html>
