<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory-Board</title>
</head>

<body class="body-board" id="body_board">
    <header class="header-board" id="board_header">
        <div class="player-points">
            <div class="player blue">
                <img src="../img/themes/code_vibe/blue_icon.svg" alt="icon blue" id="player_board_icon_blue">
                <p class="player-name">Blue</p>
                <p id="points_blue">0</p>
            </div>

            <div class="player orange">
                <img src="../img/themes/code_vibe/orange_icon.svg" alt="icon orange" id="player_board_icon_orange">
                <p class="player-name">Orange</p>
                <p id="points_orange">0</p>
            </div>
        </div>

        <div class="player-section">
            <h1>Current player:</h1>
            <img src="../img/themes/code_vibe/blue_icon.svg" alt="player icon" id="player_icon">
        </div>

        <button class="exit-button code-vibe-button" onclick="openOverlay()">
            <img src="../img/exit_icon.svg" alt="exit icon">
            <p>Exit game</p>
        </button>
    </header>

    <main id="card_container" class="card-container">

    </main>

    <dialog class="exit-dialog" id="board_overlay">
        <p>Are you sure you want to quit the game?</p>
        <div>
            <button class="stay-button" onclick="closeOverlay()">Back to game</button>
            <button class="quit-button">Exit game</button>
        </div>
    </dialog>
</body>

<script type="module" src="../src/script/board.ts"></script>

</html>
