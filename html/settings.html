<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="shortcut icon" href="../img/controller.svg" type="image/x-icon">
</head>

<body class="body-settings">
    <main class="settings-content">
        <header>
            <h1>Settings</h1>
            <div class="underline-container underline-title">
                <div class="underline-block"></div>
                <div class="underline-line"></div>
            </div>
        </header>

        <article class="settings-main">
            <section class="settings-selection">
                <div>
                    <div class="settings-subtitle">
                        <img src="../img/palette.svg" alt="pallete">
                        <h2>Game Themes</h2>
                    </div>

                    <ul class="all-selectors">
                        <li class="select-option theme-code selected" onclick="selectTheme('code-vibe')" id="code-vibe">
                            <div class="selector">
                                <div class="active-selected"></div>
                            </div>
                            <p>Code Vibes Theme</p>
                        </li>

                        <li class="select-option theme-gaming" onclick="selectTheme('gaming')" id="gaming">
                            <div class="selector">
                                <div class="active-selected"></div>
                            </div>
                            <p>Gaming Theme</p>
                        </li>

                        <li class="select-option theme-project" onclick="selectTheme('DA-Project')" id="DA-Project">
                            <div class="selector">
                                <div class="active-selected"></div>
                            </div>
                            <p>DA Project Theme</p>
                        </li>

                        <li class="select-option theme-food" onclick="selectTheme('food')" id="food">
                            <div class="selector">
                                <div class="active-selected"></div>
                            </div>
                            <p>Foods Theme</p>
                        </li>
                    </ul>
                </div>

                <div>
                    <div class="settings-subtitle">
                        <img src="../img/chess_pawn.svg" alt="pallete">
                        <h2>Choose Player</h2>
                    </div>

                    <ul class="all-selectors">
                        <li class="select-option selected" onclick="selectPlayer('blue')" id="blue">
                            <div class="selector">
                                <div class="active-selected"></div>
                            </div>
                            <p>Blue</p>
                        </li>

                        <li class="select-option" onclick="selectPlayer('orange')" id="orange">
                            <div class="selector">
                                <div class="active-selected"></div>
                            </div>
                            <p>Orange</p>
                        </li>
                    </ul>
                </div>

                <div>
                    <div class="settings-subtitle">
                        <img src="../img/board.svg" alt="pallete">
                        <h2>Board Size</h2>
                    </div>

                    <ul class="all-selectors">
                        <li class="select-option selected" onclick="selectBoardSize('s')" id="s">
                            <div class="selector">
                                <div class="active-selected"></div>
                            </div>
                            <p>16 Cards</p>
                        </li>

                        <li class="select-option" onclick="selectBoardSize('m')" id="m">
                            <div class="selector">
                                <div class="active-selected"></div>
                            </div>
                            <p>24 Cards</p>
                        </li>

                        <li class="select-option" onclick="selectBoardSize('l')" id="l">
                            <div class="selector">
                                <div class="active-selected"></div>
                            </div>
                            <p>32 Cards</p>
                        </li>
                    </ul>
                </div>
            </section>

            <section class="settings-aside">
                <img class="preview-theme current" id="theme-code" src="../img/code_vibe_main.svg" alt="code-vibe-preview">
                <img class="preview-theme" id="theme-gaming" src="../img/game_main.svg" alt="gaming-theme-preview">
                <img class="preview-theme" id="theme-food" src="../img/food_main.svg" alt="food-preview">
                <img class="preview-theme" id="theme-projects" src="../img/da_projects_main.svg" alt="DA-project-preview">

                <div class="user-selection">
                    <p id="selection_theme">Code Vibe</p>
                    <div class="separator"></div>
                    <p id="selection_player">Blue</p>
                    <div class="separator"></div>
                    <p id="selection_size">Board Size</p>
                    <a href="./board.html">
                        <img src="../img/play_icon.svg" alt="play icon">
                        <p>Play</p>
                    </a>
                </div>
            </section>
        </article>
    </main>
</body>

<script type="module" src="../src/main.ts"></script>

</html>
